<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WellBeing Companion</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/breaks.css" />
  <link rel="stylesheet" href="css/modules/dashboard.css" />
  <link rel="stylesheet" href="css/modules/eye.css" />
  <link rel="stylesheet" href="css/modules/movement.css" />
  <link rel="stylesheet" href="css/modules/msk.css" />
  <link rel="stylesheet" href="css/modules/mental.css" />
  <link rel="stylesheet" href="css/modules/lifestyle.css" />
  <link rel="stylesheet" href="css/modules/focus.css" />
  <link rel="stylesheet" href="css/modules/coach.css" />
  <link rel="stylesheet" href="css/modules/settings.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand__mark" id="brandMark"></div>
        <div class="brand__text">
          <div class="brand__name">WellBeing</div>
          <div class="brand__tag">desk-health companion</div>
        </div>
      </div>
      <nav class="nav" id="nav" aria-label="Main"></nav>
      <div class="side-foot">
        <button class="side-score" id="sideScore" title="Open dashboard">
          <div>
            <div class="side-score__val" id="sideScoreVal">–</div>
            <div class="side-score__label">health score</div>
          </div>
        </button>
        <div class="seg seg--block" id="modeSeg" title="Intervention mode"></div>
        <div class="side-mode-label" id="modeLabel"></div>
        <button class="btn btn--ghost btn--sm btn--block" id="dndBtn" title="Pause all reminders for an hour"></button>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
