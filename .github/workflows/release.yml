name: Release (Windows · macOS · Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to build for and upload assets to (e.g. v1.1.0)'
        required: true

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: '--target aarch64-apple-darwin'
            rust-targets: aarch64-apple-darwin
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
            rust-targets: x86_64-apple-darwin
          - platform: ubuntu-22.04 # AppImage + deb + rpm
            args: ''
            rust-targets: ''
          - platform: windows-latest # NSIS + MSI
            args: ''
            rust-targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      # Builds the app and uploads the platform bundles to the release for the
      # given tag (creates the release if it doesn't exist yet).
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag || github.ref_name }}
          releaseName: 'WellBeing Companion ${{ inputs.tag || github.ref_name }}'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
